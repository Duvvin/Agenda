<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Base profissional para projetos web" />
    <title>Base Web Project</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Base Web Project</h1>
        <p>Node.js + Express + MongoDB + Webpack</p>
      </header>

      <main class="main">
        <section class="card">
          <h2>Status da API</h2>
          <p id="api-status">Verificando...</p>
        </section>

        <section class="card">
          <h2>Usuários</h2>
          <form id="user-form" class="form">
            <input type="text" id="user-name" placeholder="Nome" required />
            <input type="email" id="user-email" placeholder="E-mail" required />
            <button type="submit">Adicionar</button>
          </form>
          <ul id="user-list" class="user-list"></ul>
        </section>
      </main>
    </div>
  </body>
</html>
